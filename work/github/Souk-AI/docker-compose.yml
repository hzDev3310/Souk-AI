services:
  # PHP / Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: souk-ai-app
    container_name: souk-ai-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - souk-network
    depends_on:
      - mysql

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: souk-ai-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-souk_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-sail}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - souk-network

  # Nginx Web Server (Now correctly indented)
  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - souk-network
    depends_on:
      - app

networks:
  souk-network:
    driver: bridge

volumes:
  db-data:
    driver: local
